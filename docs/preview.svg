<svg xmlns="http://www.w3.org/2000/svg" width="430" height="208" viewBox="0 0 430 208" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" role="img" aria-label="Approov role badges: my-account (ADMIN) in red, (AUTOMATION) in orange, (DEV) in green, and any other role in blue.">
  <!-- terminal panel -->
  <rect x="0" y="0" width="430" height="208" rx="10" fill="#1E1E2E"/>

  <!-- window dots -->
  <circle cx="20" cy="20" r="5" fill="#FF5F56"/>
  <circle cx="38" cy="20" r="5" fill="#FFBD2E"/>
  <circle cx="56" cy="20" r="5" fill="#27C93F"/>

  <!-- admin: red -->
  <rect x="24" y="48" width="171" height="26" rx="5" fill="#FF5555"/>
  <text x="34" y="61" fill="#F5E0DC" dominant-baseline="central">my-account (ADMIN)</text>
  <text x="213" y="61" fill="#6C7086" dominant-baseline="central">admin</text>

  <!-- automation: orange -->
  <rect x="24" y="84" width="213" height="26" rx="5" fill="#FFA500"/>
  <text x="34" y="97" fill="#1E1E2E" dominant-baseline="central">my-account (AUTOMATION)</text>
  <text x="255" y="97" fill="#6C7086" dominant-baseline="central">automation</text>

  <!-- dev: green -->
  <rect x="24" y="120" width="154" height="26" rx="5" fill="#2ECC71"/>
  <text x="34" y="133" fill="#1E1E2E" dominant-baseline="central">my-account (DEV)</text>
  <text x="196" y="133" fill="#6C7086" dominant-baseline="central">dev</text>

  <!-- other: blue -->
  <rect x="24" y="156" width="171" height="26" rx="5" fill="#5E81AC"/>
  <text x="34" y="169" fill="#F5E0DC" dominant-baseline="central">my-account (OTHER)</text>
  <text x="213" y="169" fill="#6C7086" dominant-baseline="central">anything else</text>
</svg>
